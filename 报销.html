<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>项目费用统计</title>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <style>
        :root { --primary: #007AFF; --bg: #F5F5F7; --text: #1D1D1F; --border: #E5E5E5; }
        body { font-family: -apple-system, "SF Pro Text", sans-serif; background: var(--bg); margin: 0; padding: 10px; color: var(--text); -webkit-font-smoothing: antialiased; }
        .card { background: #fff; border-radius: 10px; padding: 12px; margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        h2 { font-size: 14px; margin: 0 0 10px 0; font-weight: 600; color: #8E8E93; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .input-group { margin-bottom: 8px; }
        label { display: block; font-size: 11px; color: #8E8E93; margin-bottom: 3px; margin-left: 2px; }
        input, select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; box-sizing: border-box; background: #FFF; -webkit-appearance: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        
        button { width: 100%; padding: 10px; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .btn-add { background: var(--primary); color: white; }
        .btn-export { background: #34C759; color: white; margin-top: 15px; }
        .btn-clear { background: transparent; color: #FF3B30; font-size: 12px; margin-top: 10px; border: none; opacity: 0.7; }
        
        /* 表格美化 */
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 5px; table-layout: fixed; }
        th { text-align: left; color: #8E8E93; padding: 6px 4px; border-bottom: 1px solid var(--border); font-weight: 500; }
        td { padding: 8px 4px; border-bottom: 1px solid #F9F9F9; word-wrap: break-word; vertical-align: top; }
        .amt { text-align: right; font-family: "SF Mono", monospace; }

        .stat-box { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }
        .stat-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
        .sub-text { font-size: 11px; color: #8E8E93; padding-left: 8px; }
        .final-total { display: flex; justify-content: space-between; margin-top: 8px; padding-top: 8px; border-top: 1px double var(--border); font-weight: 700; font-size: 15px; color: var(--primary); }
    </style>
</head>
<body>

<div class="card">
    <h2>费用录入</h2>
    <div class="input-group">
        <label>说明 (摘要)</label>
        <input type="text" id="itemName" placeholder="如: 项目组晚餐">
    </div>
    <div class="grid">
        <div class="input-group">
            <label>分类</label>
            <select id="category">
                <option value="交通费">交通费</option>
                <option value="住宿费">住宿费</option>
                <option value="餐饮费">餐饮费</option>
                <option value="招待费">招待费</option>
                <option value="办公补贴">办公补贴</option>
                <option value="其他">其他</option>
            </select>
        </div>
        <div class="input-group">
            <label>发票</label>
            <select id="invoiceType">
                <option value="有发票">有发票</option>
                <option value="无发票">无发票</option>
            </select>
        </div>
    </div>
    <div class="input-group">
        <label>金额 (RMB)</label>
        <input type="number" id="amount" step="0.01" placeholder="0.00">
    </div>
    <button class="btn-add" onclick="addItem()">确认添加</button>
</div>

<div class="card">
    <h2>明细 & 汇总统计</h2>
    <table id="recordTable">
        <thead>
            <tr>
                <th style="width: 50%;">摘要/分类</th>
                <th style="width: 20%;">发票</th>
                <th style="width: 30%; text-align:right">金额</th>
            </tr>
        </thead>
        <tbody id="listBody"></tbody>
    </table>

    <div class="stat-box" id="statsArea"></div>
    
    <div class="final-total">
        <span>总计报销:</span>
        <span id="sumTotal">¥0.00</span>
    </div>

    <button class="btn-export" onclick="exportToWord()">导出 A4 竖版 Word</button>
    <button class="btn-clear" onclick="clearData()">清空本次所有数据</button>
</div>

<script>
    let records = JSON.parse(localStorage.getItem('trip_v5_data')) || [];

    function updateUI() {
        const tbody = document.getElementById('listBody');
        const statsArea = document.getElementById('statsArea');
        tbody.innerHTML = '';
        statsArea.innerHTML = '';

        let total = 0, allYes = 0, allNo = 0;
        let catGroups = {};

        records.forEach((item) => {
            const row = tbody.insertRow();
            row.innerHTML = `<td><b>${item.name}</b><br/><span style="color:#8E8E93;font-size:10px">${item.category}</span></td>
                             <td style="color:${item.invoiceType==='有发票'?'#34C759':'#FF9500'}">${item.invoiceType.replace('发票','')}</td>
                             <td class="amt">¥${item.amount.toFixed(2)}</td>`;
            
            total += item.amount;
            if(item.invoiceType === '有发票') allYes += item.amount; else allNo += item.amount;

            if(!catGroups[item.category]) catGroups[item.category] = { "有": 0, "无": 0, "sub": 0 };
            catGroups[item.category][item.invoiceType.replace('发票','')] += item.amount;
            catGroups[item.category]["sub"] += item.amount;
        });

        for(let cat in catGroups) {
            const g = catGroups[cat];
            statsArea.innerHTML += `<div class="stat-row"><span>${cat}小计</span><span>¥${g.sub.toFixed(2)}</span></div>
                                   <div class="sub-text">有票: ¥${g['有'].toFixed(2)} / 无票: ¥${g['无'].toFixed(2)}</div>`;
        }
        
        statsArea.innerHTML += `<div class="stat-row" style="margin-top:8px; border-top:1px dashed #EEE; padding-top:8px; color:#666"><span>全单有票总额</span><span>¥${allYes.toFixed(2)}</span></div>`;
        statsArea.innerHTML += `<div class="stat-row" style="color:#666"><span>全单无票总额</span><span>¥${allNo.toFixed(2)}</span></div>`;

        document.getElementById('sumTotal').innerText = `¥${total.toFixed(2)}`;
        localStorage.setItem('trip_v5_data', JSON.stringify(records));
    }

    function addItem() {
        const name = document.getElementById('itemName').value;
        const category = document.getElementById('category').value;
        const invoiceType = document.getElementById('invoiceType').value;
        const amount = parseFloat(document.getElementById('amount').value);
        if(!name || isNaN(amount)) return alert("请填写完整");
        records.push({ name, category, invoiceType, amount });
        updateUI();
        document.getElementById('itemName').value = '';
        document.getElementById('amount').value = '';
    }

    function clearData() { if(confirm("确定清空数据吗？")) { records = []; updateUI(); } }

    function exportToWord() {
        if(records.length === 0) return alert("无数据");
        let total = 0, allYes = 0, allNo = 0;
        let catGroups = {};
        
        let rows = records.map(item => {
            total += item.amount;
            if(item.invoiceType === '有发票') allYes += item.amount; else allNo += item.amount;
            if(!catGroups[item.category]) catGroups[item.category] = { "有": 0, "无": 0, "sub": 0 };
            catGroups[item.category][item.invoiceType.replace('发票','')] += item.amount;
            catGroups[item.category]["sub"] += item.amount;
            return `<tr><td style="border:0.5pt solid #333;padding:4pt;">${item.name}</td><td style="border:0.5pt solid #333;padding:4pt;text-align:center;">${item.category}</td><td style="border:0.5pt solid #333;padding:4pt;text-align:center;">${item.invoiceType}</td><td style="border:0.5pt solid #333;padding:4pt;text-align:right;">${item.amount.toFixed(2)}</td></tr>`;
        }).join('');

        let catSummary = Object.keys(catGroups).map(c => `<tr><td colspan="3" style="border:0.5pt solid #333;padding:4pt;background:#F5F5F5;">${c}汇总 (有票: ${catGroups[c]['有'].toFixed(2)} / 无票: ${catGroups[c]['无'].toFixed(2)})</td><td style="border:0.5pt solid #333;padding:4pt;text-align:right;background:#F5F5F5;">¥${catGroups[c].sub.toFixed(2)}</td></tr>`).join('');

        const html = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
        <head><xml><w:WordDocument><w:View>Print</w:View></w:WordDocument></xml></head>
        <body style="font-family:SimSun; font-size:9.5pt;">
            <h2 style="text-align:center;font-size:16pt;">项目出差费用报销明细表</h2>
            <p>填报日期：${new Date().toLocaleDateString()}</p>
            <table style="width:100%; border-collapse:collapse;">
                <tr style="background:#D9D9D9; font-weight:bold; text-align:center;">
                    <td style="border:0.5pt solid #333;padding:5pt;">费用说明</td><td style="border:0.5pt solid #333;padding:5pt;width:60pt;">分类</td><td style="border:0.5pt solid #333;padding:5pt;width:50pt;">发票</td><td style="border:0.5pt solid #333;padding:5pt;width:70pt;">金额</td>
                </tr>
                ${rows}
                ${catSummary}
                <tr style="font-weight:bold;"><td colspan="3" style="border:0.5pt solid #333;padding:5pt;text-align:right;">全单【有发票】总计：</td><td style="border:0.5pt solid #333;padding:5pt;text-align:right;">¥${allYes.toFixed(2)}</td></tr>
                <tr style="font-weight:bold;"><td colspan="3" style="border:0.5pt solid #333;padding:5pt;text-align:right;">全单【无发票】总计：</td><td style="border:0.5pt solid #333;padding:5pt;text-align:right;">¥${allNo.toFixed(2)}</td></tr>
                <tr style="font-weight:bold; background:#BDD7EE; font-size:11pt;"><td colspan="3" style="border:0.5pt solid #333;padding:8pt;text-align:right;">应报销总金额：</td><td style="border:0.5pt solid #333;padding:8pt;text-align:right;">¥${total.toFixed(2)}</td></tr>
            </table>
            <p style="margin-top:50px;">报销人：____________________ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 项目人员签字：____________________</p>
        </body></html>`;

        const blob = new Blob([html], { type: 'application/msword;charset=utf-8' });
        saveAs(blob, `报销单_${new Date().toISOString().slice(0,10)}.doc`);
    }
    updateUI();
</script>
</body>
</html>
